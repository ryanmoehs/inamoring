<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INAPROC</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_outward" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete" />
  </head>
  <body>
    <div class="header flex items-center ">
      <img src="../assets/icon48.png" class="w-16" alt="INAMINDER Logo" />
      <h3>INA<span>MINDER</span></h3>
    </div>

    <div class="content">
      <div class="search">
        <input type="text" placeholder="Cari Nomor Pesanan" />
        <input type="date" name="" id="" />
      </div>
      <div class="nav_menu">
        <!-- <button class="btn_page" data-tab="NEGOSIASI">
          <img src="../assets/nego_black.png" style="width: 20px;" alt="">Negosiasi
        </button class="btn_page" data-tab="ORDER">
        <button>
          <img src="../assets/order_black.png" style="width: 20px;" alt="">Order
        </button> -->
        <select name="status_picker" id="status_picker">
          <option value="" disabled selected>Pilih Status...</option>
          <option value="Menunggu Konfirmasi Penyedia">Menunggu Konfirmasi Penyedia</option>
          <option value="Menunggu Konfirmasi Pembeli">Menunggu Konfirmasi Pembeli</option>
          <option value="Ditinjau PPK">Ditinjau PPK</option>
          <option value="Menunggu Respon Penyedia">Menunggu Respon Penyedia</option>
          <option value="Menunggu Respon Pembeli">Menunggu Respon Pembeli</option>
          <option value="Pesanan Dibatalkan">Pesanan Dibatalkan</option>
          <option value="Disetujui Penyedia">Disetujui Penyedia</option>
          <option value="Dibatalkan Otomatis">Dibatalkan Otomatis</option>
        </select>

        <select name="urgency_picker" id="urgency_picker">
          <option value="normal">Normal</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
      <ul id="orderList">
        <li class="card urgent">
        </li>
      </ul>
    </div>
    <footer>
      <button class="btn_add">+ Tambahkan Halaman Ini</button>
    </footer>
  </body>
  <script src="popup.js"></script>
</html>
